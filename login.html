<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Budget Manager Pro</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body class="auth-page">
  <div class="auth-card">
    <h1>💰 Budget Pro</h1>
    <h2 data-i18n="login_title">Connexion</h2>

    <input type="email" id="loginEmail" placeholder="Email" />
    <input type="password" id="loginPassword" placeholder="Mot de passe" />

    <button onclick="login()" data-i18n="login_btn">Se connecter</button>

    <p><span data-i18n="no_account">Pas de compte ?</span> <a href="register.html" data-i18n="create_account">Créer un compte</a></p>
    <p class="hint">Local version: comptes + données stockés dans le navigateur.</p>
  </div>
  <link rel="icon" type="image/png" href="assets/logo.png">

  <script src="firebase.js"></script>
  <script src="lang.js"></script>
  <script src="auth.js"></script>
</body>
</html>
